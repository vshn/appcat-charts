suite: tcpRoute template
release:
  name: gitea-unittests
  namespace: testing
templates:
  - templates/gitea/tcpRoute.yaml
tests:
  - it: renders nothing when disabled
    set:
      tcpRoute.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: basic tcpRoute configuration
    set:
      tcpRoute.enabled: true
      tcpRoute.parentRefs:
        - name: my-gateway
          namespace: gateway-ns
          sectionName: ssh
    asserts:
      - isKind:
          of: TCPRoute
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1alpha2
      - equal:
          path: metadata.name
          value: gitea-unittests-forgejo-ssh
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-ns
      - equal:
          path: spec.parentRefs[0].sectionName
          value: ssh
      - equal:
          path: spec.rules[0].backendRefs[0].kind
          value: Service
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: gitea-unittests-forgejo-ssh
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 22

  - it: with custom port configuration
    set:
      tcpRoute.enabled: true
      tcpRoute.port: 2222
      tcpRoute.parentRefs:
        - name: my-gateway
          namespace: gateway-ns
    asserts:
      - isKind:
          of: TCPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 2222

  - it: uses service.ssh.port when no port override
    set:
      tcpRoute.enabled: true
      service.ssh.port: 2222
      tcpRoute.parentRefs:
        - name: my-gateway
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 2222

  - it: with annotations
    set:
      tcpRoute.enabled: true
      tcpRoute.annotations:
        example.com/foo: bar
      tcpRoute.parentRefs:
        - name: my-gateway
    asserts:
      - isKind:
          of: TCPRoute
      - equal:
          path: metadata.annotations
          value:
            example.com/foo: bar

  - it: with multiple parentRefs
    set:
      tcpRoute.enabled: true
      tcpRoute.parentRefs:
        - name: gateway-1
          namespace: ns-1
          sectionName: ssh
        - name: gateway-2
          namespace: ns-2
          sectionName: ssh-alt
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: gateway-1
      - equal:
          path: spec.parentRefs[1].name
          value: gateway-2
      - equal:
          path: spec.parentRefs[1].sectionName
          value: ssh-alt
