{{- if (eq (include "cluster.useBarmanCloudPlugin" .) "true") }}
{{- $name := include "cluster.fullname" . -}}
{{- $namespace := include "cluster.namespace" . }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}-post-upgrade
  namespace: {{ $namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-post-upgrade
  namespace: {{ $namespace }}
rules:
- apiGroups: ["postgresql.cnpg.io"]
  resources: ["clusters"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["postgresql.cnpg.io"]
  resources: ["backups"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-post-upgrade
  namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-post-upgrade
subjects:
- kind: ServiceAccount
  name: {{ $name }}-post-upgrade
  namespace: {{ $namespace }}
{{- end }}
